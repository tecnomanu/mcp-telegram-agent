<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <rect x="80" y="75" width="1040" height="480" rx="24" fill="#0b1220" stroke="#22d3ee" stroke-width="2"/>
  <text x="120" y="145" font-family="Arial, sans-serif" font-size="42" fill="#f9fafb" font-weight="700">Get chat_id and message_id</text>
  <rect x="120" y="190" width="960" height="320" rx="16" fill="#111827" stroke="#334155"/>
  <text x="150" y="250" font-family="Courier New, monospace" font-size="30" fill="#a7f3d0">https://api.telegram.org/bot&lt;TOKEN&gt;/getUpdates</text>
  <text x="150" y="305" font-family="Arial, sans-serif" font-size="28" fill="#f9fafb">Look for:</text>
  <text x="190" y="355" font-family="Courier New, monospace" font-size="27" fill="#fde68a">"chat": { "id": 889721252, ... }</text>
  <text x="190" y="400" font-family="Courier New, monospace" font-size="27" fill="#fde68a">"message_id": 207</text>
  <text x="150" y="460" font-family="Arial, sans-serif" font-size="26" fill="#93c5fd">Use chat_id in BOT_TELEGRAM_CHAT_ID (or BOT_TELEGRAM_ID).</text>
</svg>
